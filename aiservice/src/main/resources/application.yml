server:
  port: 8083

spring:
  application:
    name: ai-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/fitnessrecommendation
      database: fitnessrecommendation

# ── Local AI Model (replaces OpenAI / Gemini) ────────────────────────────────
# The Python FastAPI server in ai_model/main.py runs here.
# Start it with: cd ai_model && python main.py
local:
  ai:
    url: ${LOCAL_AI_URL:http://localhost:8085}

springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /swagger-ui.html